name: 앨범 48h 자동삭제

# 앨범(srk-gallery 태그) 사진·영상을 업로드 48시간 뒤 자동 삭제한다.
# 아바타/히어로 배경은 태그가 없어 삭제되지 않는다.
on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "삭제 없이 대상만 출력 (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: cloudinary-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run cleanup
        env:
          CLOUDINARY_CLOUD_NAME: dpv6iqkfu
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_DB_URL: https://srk-mt-default-rtdb.asia-southeast1.firebasedatabase.app
          GALLERY_TAG: srk-gallery
          MAX_AGE_HOURS: "48"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 scripts/cloudinary_cleanup.py
